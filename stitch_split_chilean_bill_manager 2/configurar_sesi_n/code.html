<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>

                        "error": "#ffb4ab",

                        "on-primary-container": "#4c6e00",

                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "screen-edge": "20px",
                        "touch-target-min": "48px",
                        "base": "8px",
                        "stack-gap": "12px",

                        "bottom-bar-height": "80px"

                    "fontFamily": {

                    },
                    "fontSize": {
                        "display-amount": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "caption-label": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "button-text": ["16px", {"lineHeight": "1.0", "fontWeight": "600"}],
                        "hero-amount": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "badge-text": ["12px", {"lineHeight": "1.0", "fontWeight": "600"}],
                        "body-main": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "section-title": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}]

            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-bg-base text-text-primary min-h-screen font-body-main">
<!-- TopAppBar -->
<header class="bg-neutral-950 flex justify-between items-center w-full px-5 h-16 fixed top-0 z-50 border-b border-neutral-800">
<div class="flex items-center gap-4">
<button class="transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-lime-400">menu</span>
</button>
<span class="text-2xl font-black italic text-lime-400 font-inter tracking-tight">Split</span>
</div>
<div class="flex items-center">
<button class="transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-lime-400">account_circle</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-screen-edge max-w-lg mx-auto">
<!-- Header Section -->
<div class="mb-8">
<h1 class="font-section-title text-section-title text-primary-fixed mb-2 uppercase tracking-tighter">Nueva Sesión</h1>
<p class="font-caption-label text-caption-label text-text-secondary">Configura los detalles para dividir la cuenta con tu grupo.</p>
</div>
<form class="space-y-stack-gap">
<!-- People Counter -->
<div class="bg-surface-card p-card-inner rounded-xl border-l-4 border-lime-400">
<label class="block font-caption-label text-caption-label text-lime-400 mb-3 uppercase tracking-widest font-bold">Integrantes</label>
<div class="flex items-center justify-between">
<span class="text-text-primary font-section-title text-section-title">¿Cuántas personas son?</span>
<div class="flex items-center gap-4 bg-surface-elevated p-1 rounded-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-neutral-800 text-lime-400 active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-display-amount text-display-amount min-w-[32px] text-center">4</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-lime-400 text-bg-base active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 700;">add</span>
</button>
</div>
</div>
</div>
<!-- Tip Selector -->
<div class="bg-surface-card p-card-inner rounded-xl border border-border-subtle">
<div class="flex justify-between items-center mb-4">
<label class="font-caption-label text-caption-label text-text-secondary uppercase tracking-widest">Propina Sugerida</label>
<span class="bg-status-success-bg text-status-success px-3 py-1 rounded-full font-badge-text text-badge-text">10% Default</span>
</div>
<div class="space-y-4">
<input class="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-lime-400" max="25" min="0" type="range" value="10"/>
<div class="flex justify-between font-caption-label text-caption-label text-text-secondary">
<span>0%</span>
<span>10%</span>
<span>15%</span>
<span>20%</span>
<span>25%</span>
</div>
</div>
</div>
<!-- Payment Details Header -->
<div class="pt-4 pb-2">
<h2 class="font-section-title text-section-title text-primary-fixed mb-1">Datos de Transferencia</h2>
<p class="font-caption-label text-caption-label text-text-secondary">Información para que tus amigos te paguen.</p>
</div>
<!-- Bank Info Inputs -->
<div class="space-y-3">
<div class="relative">
<input class="w-full bg-surface-elevated border-border-subtle text-text-primary rounded-xl px-4 py-4 focus:ring-2 focus:ring-lime-400 focus:border-transparent outline-none transition-all placeholder:text-text-disabled" placeholder="Titular de la cuenta" type="text"/>
</div>
<div class="relative">
<input class="w-full bg-surface-elevated border-border-subtle text-text-primary rounded-xl px-4 py-4 focus:ring-2 focus:ring-lime-400 focus:border-transparent outline-none transition-all placeholder:text-text-disabled" placeholder="Banco" type="text"/>
</div>
<div class="relative">
<input class="w-full bg-surface-elevated border-border-subtle text-text-primary rounded-xl px-4 py-4 focus:ring-2 focus:ring-lime-400 focus:border-transparent outline-none transition-all placeholder:text-text-disabled" placeholder="Número de Cuenta" type="number"/>
</div>
</div>
</form>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-neutral-950 border-t border-neutral-800 p-4 h-auto z-40">
<div class="max-w-lg mx-auto">
<button class="w-full h-14 bg-lime-400 text-bg-base font-button-text text-button-text rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-[0_0_20px_rgba(182,245,66,0.2)]">
                Generar link
                <span class="material-symbols-outlined">link</span>
</button>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-lime-400/5 blur-[120px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-lime-400/5 blur-[150px]"></div>
</body></html>
